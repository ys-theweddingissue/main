<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends Gallery | Yusaku & Saori</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --color-bg: #FAF8F5;
            --color-text: #4A4238;
            --color-accent: #8C9A8E;
            --color-border: #D3CBB8;
        }

        body {
            font-family: 'Lato', 'Noto Sans JP', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .serif { font-family: 'Cormorant Garamond', serif; }

        /* 雑誌風の静かな登場アニメーション */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 雑誌風フィルターとコンテナ */
        .img-container {
            overflow: hidden;
            position: relative;
            background-color: #eee;
            /* フィルムのような質感のフィルター */
            filter: sepia(10%) contrast(95%) brightness(102%);
            box-shadow: 0 10px 30px -15px rgba(0,0,0,0.1);
        }
        
        .img-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 80%, rgba(74, 66, 56, 0.05));
            pointer-events: none;
        }

        .img-container img {
            transition: transform 2s ease;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .img-container:hover img {
            transform: scale(1.08);
        }

        /* 縦型写真への装飾的な余白 */
        .portrait-frame {
            padding: 10% 5%;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--color-bg); }
        ::-webkit-scrollbar-thumb { background: var(--color-border); }
    </style>
</head>
<body class="antialiased">

    <!-- Header Navigation -->
    <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#FAF8F5]/80 backdrop-blur-md transition-all duration-300">
        <a href="index.html" class="font-lato text-xl tracking-widest font-bold cursor-pointer hover:text-[#8C9A8E] transition-colors">
            Y & S
        </a>
        <button onclick="history.back()" class="p-2 focus:outline-none hover:scale-110 transition-transform flex items-center gap-2">
            <span class="text-[10px] tracking-widest opacity-60">CLOSE</span>
            <i data-lucide="x" class="w-5 h-5 text-wedding-text"></i>
        </button>
    </header>
    
    <!-- Hero Section -->
    <header class="pt-20 items-center justify-center md:px-20">
        <div class="relative w-full aspect-[16/6] overflow-hidden reveal">
            <img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_00.jpg" 
                class="w-full h-full object-cover object-center brightness-75 opacity-30">
            
            <div class="absolute inset-0 flex flex-col items-center justify-center text-Black">
                <h1 class="font-lato text-4xl md:text-7xl font-light tracking-[0.25em] drop-shadow-sm">
                    GALLERY
                </h1>
            </div>
        </div>

        <div class="max-w-4xl pt-5 mx-auto text-center fade-up">
            <p class="text-sm leading-loose opacity-70 max-w-xl mx-auto px-4">
                本日お越し頂いた皆様との思い出を<br>
                ほんの少しだけ紹介いたします。
            </p>
        </div>

        <!-- ↓余白をスマホで圧縮 -->
        <div class="mt-12 mb-12 md:mt-40 flex flex-col items-center justify-center reveal">
            <div class="animate-bounce text-[#8C9A8E]">
                <i data-lucide="chevron-down" class="w-6 h-6 opacity-50"></i>
            </div>
        </div>

    </header>





    <!-- Magazine Grid Layout -->
    <main class="max-w-[1200px] mx-auto px-6 md:px-12 py-10">
        <div class="space-y-12 md:space-y-24">
            
            <!-- Row 1: Triple Rhythm (Optimized for all screens) -->
            <div class="grid grid-cols-3 gap-2 md:gap-8 px-0 md:px-20">
                <div class="aspect-[2/3] img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_14.jpg"></div>
                <div class="aspect-[2/3] img-container reveal" style="transition-delay: 0.1s"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_15.jpg"></div>
                <div class="aspect-[2/3] img-container reveal" style="transition-delay: 0.2s"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_16.jpg"></div>
            </div>


            <!-- Row 2: Featured Landscape -->
            <div class="reveal">
                <div class="aspect-[16/9] md:aspect-[21/9] img-container">
                    <img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_04.jpg">
                </div>
                <p class="mt-4 text-[10px] tracking-[0.2em] opacity-40 text-right uppercase italic font-light">Memory 04 / Scenery</p>
            </div>

            <!-- Row 3: Offset Portraits (Balanced for Mobile) -->
            <div class="grid grid-cols-2 gap-2 md:gap-8 px-0 md:px-20">
                <div class="aspect-[5/4] img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_05.jpg"></div>
                <div class="aspect-[5/4] img-container reveal" style="transition-delay: 0.1s"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_06.jpg"></div>
            </div>

            <!-- Row 4: Grid Mix (Optimized 4-grid for narrow screens) -->
            <div class="grid grid-cols-4 gap-1.5 md:gap-4">
                <div class="aspect-square img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_07.jpg"></div>
                <div class="aspect-square img-container reveal" style="transition-delay: 0.1s"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_08.jpg"></div>
                <div class="aspect-square img-container reveal" style="transition-delay: 0.2s"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_09.jpg"></div>
                <div class="aspect-square img-container reveal" style="transition-delay: 0.3s"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_10.jpg"></div>
            </div>


            <!-- Row 6: Triptych Vertical -->
            <div class="grid grid-cols-3 gap-2 md:gap-8 px-0 md:px-20">
                <div class="aspect-[2/3] img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_14.jpg"></div>
                <div class="aspect-[2/3] img-container reveal" style="transition-delay: 0.1s"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_15.jpg"></div>
                <div class="aspect-[2/3] img-container reveal" style="transition-delay: 0.2s"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_16.jpg"></div>
            </div>

            <!-- Row 5: Asymmetric Focus (Responsive structure) -->
            <div class="grid grid-cols-2 gap-2 md:gap-8 px-0 md:px-20">
                <div class="aspect-[5/4] img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_12.jpg"></div>
                <div class="aspect-[5/4] img-container reveal" style="transition-delay: 0.1s"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_13.jpg"></div>
            </div>

            <!-- Row 7: Dynamic Large Grid (Stacked but side-by-side for mobile) -->
            <div class="reveal">
                <div class="aspect-[16/9] md:aspect-[21/9] img-container">
                    <img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_04.jpg">
                </div>
                <p class="mt-4 text-[10px] tracking-[0.2em] opacity-40 text-right uppercase italic font-light">Memory 04 / Scenery</p>
            </div>


            <!-- Row 6: Triptych Vertical -->
            <div class="grid grid-cols-3 gap-2 md:gap-8 px-0 md:px-20">
                <div class="aspect-[2/3] img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_14.jpg"></div>
                <div class="aspect-[2/3] img-container reveal" style="transition-delay: 0.1s"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_15.jpg"></div>
                <div class="aspect-[2/3] img-container reveal" style="transition-delay: 0.2s"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_16.jpg"></div>
            </div>

            <!-- Row 4: Grid Mix (Optimized 4-grid for narrow screens) -->
            <div class="grid grid-cols-4 gap-1.5 md:gap-4">
                <div class="aspect-square img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_07.jpg"></div>
                <div class="aspect-square img-container reveal" style="transition-delay: 0.1s"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_17.jpg"></div>
                <div class="aspect-square img-container reveal" style="transition-delay: 0.2s"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_18.jpg"></div>
                <div class="aspect-square img-container reveal" style="transition-delay: 0.3s"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_19.jpg"></div>
            </div>


            <!-- Row 7: Dynamic Large Grid (Stacked but side-by-side for mobile) -->
            <div class="reveal">
                <div class="aspect-[14/9] md:aspect-[21/9] img-container">
                    <img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_21.jpg">
                </div>
                <div class="mt-8 text-center">
                    <p class="font-lato text-[11px] tracking-[0.5em] opacity-30 uppercase">Eternal Memories</p>
                </div>
            </div>
        
        </div>

        <!-- Back Navigation -->
        <section class="reveal pt-24 text-center">
            <button onclick="history.back()" class="group inline-flex flex-col items-center gap-4 transition-all hover:scale-105">
                <div class="w-10 h-10 rounded-full border border-[#4A4238]/20 flex items-center justify-center group-hover:bg-[#4A4238] group-hover:text-white transition-all">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                </div>
                <span class="block text-[9px] tracking-[0.4em] text-[#4A4238]/40 uppercase font-bold">Back to Page</span>
            </button>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-white py-16 text-center border-t border-wedding-border/20 relative z-10">
        <h2 class="font-lato text-2xl tracking-[0.3em] mb-4 font-light">YUSAKU & SAORI</h2>
        <p class="font-lato text-xs tracking-[0.2em] text-wedding-text/40 mb-2">2026.9.12</p>
        <p class="text-[10px] text-wedding-text/30 font-light">Thank you for coming to our wedding.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            // スクロール時のフェードイン制御
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { 
                threshold: 0.05,
                rootMargin: "0px 0px -50px 0px"
            });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

            // ヘッダーのスクロール制御
            let lastScroll = 0;
            const header = document.querySelector('header.fixed');
            window.addEventListener('scroll', () => {
                const currentScroll = window.pageYOffset;
                if (currentScroll > 100) {
                    header.style.backgroundColor = 'rgba(250, 248, 245, 0.95)';
                    header.style.paddingTop = '1rem';
                    header.style.paddingBottom = '1rem';
                } else {
                    header.style.backgroundColor = 'rgba(250, 248, 245, 0.6)';
                    header.style.paddingTop = '1.5rem';
                    header.style.paddingBottom = '1.5rem';
                }
                lastScroll = currentScroll;
            });
        });
    </script>
</body>
</html>
